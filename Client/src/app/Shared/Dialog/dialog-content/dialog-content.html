<mat-dialog-content class="mat-typography">
  @if(data.user) {
    <h2 mat-dialog-title>Edition de l'utilisateur {{data.user.name}}</h2>
  } @else {
    <h2 mat-dialog-title>Création d'un utilisateur</h2>
  }

  <form class="example-form">
  <mat-form-field class="w-full">
    <mat-label>Email</mat-label>
    <input type="email" matInput [formControl]="emailFormControl" placeholder="Ex. pat@example.com">
    @if (emailFormControl.hasError('email') && !emailFormControl.hasError('required')) {
      <mat-error>Please enter a valid email address</mat-error>
    }
    @if (emailFormControl.hasError('required')) {
      <mat-error>Email is <strong>required</strong></mat-error>
    }
  </mat-form-field>
</form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Annuler</button>
  <button matButton [mat-dialog-close]="true" cdkFocusInitial>Valider</button>
</mat-dialog-actions>
